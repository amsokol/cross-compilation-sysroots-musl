name: Build musl sysroots

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build sysroot (${{ matrix.arch }}${{ matrix.variant && format('-{0}', matrix.variant) || '' }}, linux ${{ matrix.linux_version }}, ${{ matrix.profile }})
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:13

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        variant: [v1, v2, v3, v4, ""]
        linux_version: ["6.12.76", "6.6.129", "6.1.166"]
        profile: [release, debug]
        exclude:
          - arch: aarch64
            variant: v1
          - arch: aarch64
            variant: v2
          - arch: aarch64
            variant: v3
          - arch: aarch64
            variant: v4
          - arch: x86_64
            variant: ""
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential wget xz-utils rsync git ca-certificates curl

      - name: Checkout
        uses: actions/checkout@v5

      - name: Build sysroot
        run: |
          ARGS="--arch=${{ matrix.arch }} --linux-version=${{ matrix.linux_version }} --profile=${{ matrix.profile }}"
          if [ -n "${{ matrix.variant }}" ]; then
            ARGS="${ARGS} --variant=${{ matrix.variant }}"
          fi
          ./create-sysroot.sh ${ARGS}

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          for file in output/*.tar.xz; do
            filename=$(basename "$file")
            echo "Uploading $filename..."
            curl -sL --fail-with-body \
              -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/x-xz" \
              --data-binary @"$file" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ github.event.release.id }}/assets?name=$filename"
            echo ""
          done
