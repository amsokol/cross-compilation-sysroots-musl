name: Build musl sysroots

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build sysroot (${{ matrix.arch }}, linux ${{ matrix.linux_version }})
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:13

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        linux_version: ["6.12.76", "6.6.129", "6.1.166"]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential wget xz-utils rsync git ca-certificates

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sysroot
        run: ./create-sysroot.sh --arch=${{ matrix.arch }} --linux-version=${{ matrix.linux_version }}

      - name: Upload sysroot
        uses: actions/upload-artifact@v4
        with:
          name: sysroot-${{ matrix.arch }}-linux-${{ matrix.linux_version }}
          path: output/*.tar.xz

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          cp artifacts/sysroot-*/*.tar.xz release/
          cd release
          sha256sum *.tar.xz > sha256sums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
