name: Build musl sysroots

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build sysroot (${{ matrix.arch }}, linux ${{ matrix.linux_version }})
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:13

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        linux_version: ["6.12.76", "6.6.129", "6.1.166"]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential wget xz-utils rsync git ca-certificates

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sysroot
        run: ./create-sysroot.sh --arch=${{ matrix.arch }} --linux-version=${{ matrix.linux_version }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: output/*.tar.xz
